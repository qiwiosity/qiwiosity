<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qiwiosity</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #FAFAFA;
      color: #1F2937;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #0D9488, #14B8A6);
      padding: 20px;
      text-align: center;
    }
    .header h1 {
      color: white;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header p {
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      margin-top: 4px;
    }

    /* Views */
    .view { display: none; }
    .view.active { display: block; }

    /* ── Login View ────────────────────────────── */
    .login-view { padding: 24px 20px; }
    .login-view h2 { font-size: 18px; margin-bottom: 16px; text-align: center; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600;
      color: #6B7280; margin-bottom: 4px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .field input {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid #E5E7EB; border-radius: 8px;
      font-size: 14px; background: white; font-family: inherit;
    }
    .field input:focus {
      outline: none; border-color: #14B8A6;
      box-shadow: 0 0 0 3px rgba(20,184,166,0.1);
    }

    .btn-primary {
      width: 100%; padding: 12px; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit; color: white;
      background: linear-gradient(135deg, #0D9488, #14B8A6);
      transition: all 0.2s;
    }
    .btn-primary:hover { background: linear-gradient(135deg, #0F766E, #0D9488); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-secondary {
      width: 100%; padding: 10px; border: 1.5px solid #E5E7EB;
      border-radius: 10px; font-size: 13px; cursor: pointer;
      background: white; color: #6B7280; margin-top: 10px;
      font-family: inherit;
    }
    .btn-secondary:hover { border-color: #14B8A6; color: #0D9488; }

    .error-msg {
      background: #FEF2F2; color: #991B1B; padding: 8px 12px;
      border-radius: 8px; font-size: 13px; margin-bottom: 14px;
      display: none;
    }
    .error-msg.show { display: block; }

    .success-msg {
      background: #ECFDF5; color: #065F46; padding: 8px 12px;
      border-radius: 8px; font-size: 13px; margin-bottom: 14px;
      display: none; text-align: center;
    }
    .success-msg.show { display: block; }

    .toggle-link {
      text-align: center; margin-top: 16px;
      font-size: 13px; color: #6B7280;
    }
    .toggle-link a {
      color: #0D9488; cursor: pointer; text-decoration: none;
    }
    .toggle-link a:hover { text-decoration: underline; }

    /* ── Dashboard View ────────────────────────── */
    .dashboard { padding: 16px 20px; }

    .user-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid #E5E7EB; margin-bottom: 16px;
    }
    .user-bar .email { font-size: 13px; color: #6B7280; }
    .user-bar .logout {
      font-size: 12px; color: #EF4444; cursor: pointer;
      background: none; border: none; font-family: inherit;
    }
    .user-bar .logout:hover { text-decoration: underline; }

    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px; margin-bottom: 20px;
    }
    .stat-card {
      background: white; border-radius: 10px; padding: 14px;
      text-align: center; border: 1px solid #E5E7EB;
    }
    .stat-card .num {
      font-size: 28px; font-weight: 700; color: #0D9488;
      line-height: 1;
    }
    .stat-card .label {
      font-size: 10px; color: #6B7280; margin-top: 4px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* Recent items list */
    .section-title {
      font-size: 12px; font-weight: 600; color: #6B7280;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .item-list { list-style: none; }
    .item-list li {
      display: flex; align-items: center; gap: 12px;
      padding: 10px; background: white; border-radius: 10px;
      border: 1px solid #E5E7EB; margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .item-list li:hover { border-color: #14B8A6; }

    .item-thumb {
      width: 48px; height: 48px; border-radius: 8px;
      object-fit: cover; background: #F0FDFA; flex-shrink: 0;
    }
    .item-thumb-placeholder {
      width: 48px; height: 48px; border-radius: 8px;
      background: linear-gradient(135deg, #F0FDFA, #CCFBF1);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-info .name {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-info .meta {
      font-size: 11px; color: #6B7280; margin-top: 2px;
    }
    .item-delete {
      background: none; border: none; color: #D1D5DB;
      cursor: pointer; font-size: 18px; padding: 4px;
    }
    .item-delete:hover { color: #EF4444; }

    .empty-state {
      text-align: center; padding: 32px 20px; color: #9CA3AF;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    .shortcut-tip {
      text-align: center; padding: 12px;
      font-size: 11px; color: #9CA3AF;
      border-top: 1px solid #E5E7EB; margin-top: 8px;
    }
    .shortcut-tip kbd {
      background: #F3F4F6; padding: 2px 6px;
      border-radius: 4px; font-size: 11px;
      border: 1px solid #D1D5DB; font-family: inherit;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Qiwiosity</h1>
    <p>Your NZ Travel Wishlist</p>
  </div>

  <!-- ── Login View ──────────────────────────── -->
  <div id="login-view" class="view active">
    <div class="login-view">
      <h2 id="auth-title">Sign In</h2>
      <div id="auth-error" class="error-msg"></div>
      <div id="auth-success" class="success-msg"></div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="auth-email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="auth-password" placeholder="Your password" />
      </div>

      <button class="btn-primary" id="auth-submit">Sign In</button>

      <div class="toggle-link" id="toggle-auth">
        Don't have an account? <a id="toggle-auth-link">Sign Up</a>
      </div>
    </div>
  </div>

  <!-- ── Dashboard View ──────────────────────── -->
  <div id="dashboard-view" class="view">
    <div class="dashboard">
      <div class="user-bar">
        <span class="email" id="user-email"></span>
        <button class="logout" id="logout-btn">Sign Out</button>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="num" id="stat-total">0</div>
          <div class="label">Saved</div>
        </div>
        <div class="stat-card">
          <div class="num" id="stat-visited">0</div>
          <div class="label">Visited</div>
        </div>
        <div class="stat-card">
          <div class="num" id="stat-matched">0</div>
          <div class="label">In App</div>
        </div>
      </div>

      <div class="section-title">Recently Saved</div>
      <ul class="item-list" id="recent-items"></ul>

      <div class="shortcut-tip">
        Press <kbd>Alt</kbd> + <kbd>Q</kbd> on any page to quick-save
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
